server.port=8081

# 1. IDENTIFY THE SERVICE (Fixes "UNKNOWN" in Eureka)
spring.application.name=user-service

# 2. DATABASE CONFIGURATION (Separate from Owner)
spring.datasource.url=jdbc:mysql://localhost:3306/myfin_user_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 3. EUREKA CLIENT REGISTRATION
# Tells the User Service to register with the Eureka Server
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true