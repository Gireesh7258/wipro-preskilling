server.port=8082

# 1. NAME YOUR SERVICE (Fixes "UNKNOWN" in Dashboard)
spring.application.name=owner-service

# 2. DATABASE CONFIGURATION
spring.datasource.url=jdbc:mysql://localhost:3306/myfin_owner_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 3. EUREKA CLIENT CONFIGURATION (Required for 4 points)
# Tells this service where to find the Eureka Server
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true